services:
  postgres:
    image: postgres:16-alpine
    container_name: market-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market_assistant
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
